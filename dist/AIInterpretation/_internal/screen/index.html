<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>实时同传字幕</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 48px 80px;
      overflow: hidden;
      user-select: none;
      font-family: 'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', 'Hiragino Sans GB', sans-serif;
    }

    /* ── Subtitle area ─────────────────────────────────────────────────── */
    #subtitle-wrap {
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .sub-line {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sub-line.final   { opacity: 1; }
    .sub-line.partial { opacity: 0.4; }

    .sub-line.new-final {
      animation: slideUp 0.25s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Text styles ───────────────────────────────────────────────────── */
    .zh-text {
      font-size: clamp(42px, 4.2vw, 64px);
      font-weight: 700;
      color: #ffffff;
      line-height: 1.35;
      letter-spacing: 0.03em;
      text-shadow: 0 2px 12px rgba(0,0,0,0.95);
    }

    .en-text {
      font-size: clamp(30px, 3vw, 48px);
      font-weight: 400;
      color: #7dd3fc;
      line-height: 1.35;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    }

    /* Fallback/error text shares en-text style but yellow */
    .en-text.warn { color: #fde68a; }

    /* ── Separator between finals and partial ──────────────────────────── */
    .sep {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 2px 0;
    }

    /* ── Top-right controls ────────────────────────────────────────────── */
    #top-right {
      position: fixed;
      top: 24px;
      right: 32px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #status {
      font-size: 13px;
      letter-spacing: 0.06em;
      padding: 5px 14px;
      border-radius: 9999px;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(4px);
      transition: color 0.4s;
    }
    #status.ok   { color: #4ade80; }
    #status.warn { color: #facc15; }
    #status.err  { color: #f87171; }

    #rec-btn {
      font-size: 13px;
      font-family: inherit;
      letter-spacing: 0.06em;
      padding: 5px 14px;
      border-radius: 9999px;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(4px);
      border: none;
      color: rgba(255,255,255,0.55);
      cursor: pointer;
      transition: color 0.3s, background 0.3s;
    }
    #rec-btn:hover { background: rgba(255,255,255,0.13); }
    #rec-btn.recording {
      color: #f87171;
      background: rgba(248,113,113,0.18);
    }

    /* ── Clock (top-left) ───────────────────────────────────────────────── */
    #clock {
      position: fixed;
      top: 24px;
      left: 32px;
      font-size: 13px;
      color: rgba(255,255,255,0.22);
      letter-spacing: 0.08em;
    }

    /* ── Terms version badge (bottom-right, tiny) ──────────────────────── */
    #terms-badge {
      position: fixed;
      bottom: 18px;
      right: 28px;
      font-size: 11px;
      color: rgba(255,255,255,0.15);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div id="clock">--:--</div>
  <div id="top-right">
    <button id="rec-btn">⏺ 录制</button>
    <div id="status" class="err">● 连接中...</div>
  </div>
  <div id="terms-badge">术语库 v0</div>
  <div id="subtitle-wrap"></div>

  <script>
    // ── Config ────────────────────────────────────────────────────────────────
    const MAX_FINALS = 3;
    const WS_URL = location.protocol === 'file:'
      ? 'ws://localhost:8000/ws'
      : `ws://${location.host}/ws`;
    const API_BASE = location.protocol === 'file:' ? 'http://localhost:8000' : '';
    const RECONNECT_MS = 2000;
    const PING_INTERVAL_MS = 10000;

    // ── State ─────────────────────────────────────────────────────────────────
    let finals = [];     // [{zh, en, id}]
    let partial = null;  // {zh} | null
    let lineId = 0;
    let lastNewId = -1;
    let ws = null;
    let pingTimer = null;
    let termsVersion = 0;

    // ── Recording state ───────────────────────────────────────────────────────
    let isRecording = false;
    let recordedLines = [];  // [{zh, en, ts}]

    // ── Render ────────────────────────────────────────────────────────────────
    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function render() {
      const wrap = document.getElementById('subtitle-wrap');
      const parts = [];

      for (const f of finals) {
        const isNew = f.id === lastNewId;
        const enHtml = f.en
          ? `<div class="en-text${f.en.startsWith('[') ? ' warn' : ''}">${esc(f.en)}</div>`
          : '';
        parts.push(
          `<div class="sub-line final${isNew ? ' new-final' : ''}">` +
          `<div class="zh-text">${esc(f.zh)}</div>` +
          enHtml +
          `</div>`
        );
      }

      if (partial) {
        if (finals.length > 0) parts.push('<div class="sep"></div>');
        parts.push(
          `<div class="sub-line partial">` +
          `<div class="zh-text">${esc(partial.zh)}</div>` +
          `</div>`
        );
      }

      wrap.innerHTML = parts.join('');
    }

    // ── Recording helpers ─────────────────────────────────────────────────────
    function downloadDoc() {
      const dateStr = new Date().toLocaleString('zh-CN');
      const rows = recordedLines.map(r => {
        const t = r.ts ? new Date(r.ts).toLocaleTimeString('zh-CN') : '';
        return `<tr>
          <td style="color:#888;font-size:12px;white-space:nowrap;padding:6px 10px;border-bottom:1px solid #eee;">${t}</td>
          <td style="font-size:15px;padding:6px 10px;border-bottom:1px solid #eee;">${r.zh}</td>
          <td style="font-size:14px;color:#1d4ed8;padding:6px 10px;border-bottom:1px solid #eee;">${r.en}</td>
        </tr>`;
      }).join('');
      const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>字幕记录</title></head><body style="font-family:Microsoft YaHei,Arial,sans-serif;padding:24px;">
<h2 style="margin-bottom:4px;">实时同传字幕记录</h2>
<p style="color:#666;font-size:13px;margin-bottom:16px;">导出时间：${dateStr}　共 ${recordedLines.length} 句</p>
<table style="border-collapse:collapse;width:100%;">
<thead><tr>
  <th style="text-align:left;padding:6px 10px;border-bottom:2px solid #ccc;">时间</th>
  <th style="text-align:left;padding:6px 10px;border-bottom:2px solid #ccc;">中文</th>
  <th style="text-align:left;padding:6px 10px;border-bottom:2px solid #ccc;">English</th>
</tr></thead>
<tbody>${rows}</tbody>
</table></body></html>`;
      const blob = new Blob([html], { type: 'application/msword' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const fname = `字幕记录_${new Date().toLocaleDateString('zh-CN').replace(/\//g, '-')}.doc`;
      a.download = fname;
      a.click();
      URL.revokeObjectURL(url);
    }

    document.getElementById('rec-btn').addEventListener('click', () => {
      const btn = document.getElementById('rec-btn');
      if (!isRecording) {
        isRecording = true;
        recordedLines = [];
        btn.textContent = '⏹ 停止录制';
        btn.classList.add('recording');
      } else {
        isRecording = false;
        btn.textContent = '⏺ 录制';
        btn.classList.remove('recording');
        downloadDoc();
      }
    });

    // ── Message handler ───────────────────────────────────────────────────────
    function onMessage(data) {
      if (data.status === 'final') {
        partial = null;
        const entry = { zh: data.zh, en: data.en || '', id: ++lineId };
        finals.push(entry);
        if (finals.length > MAX_FINALS) finals.shift();
        lastNewId = entry.id;
        if (isRecording) recordedLines.push({ zh: data.zh, en: data.en || '', ts: data.ts || new Date().toISOString() });
      } else {
        partial = { zh: data.zh };
      }
      render();

      // Sync terms version if server sends it
      if (data.terms_version !== undefined && data.terms_version !== termsVersion) {
        termsVersion = data.terms_version;
        document.getElementById('terms-badge').textContent = `术语库 v${termsVersion}`;
      }
    }

    // ── WebSocket ─────────────────────────────────────────────────────────────
    function setStatus(cls, text) {
      const el = document.getElementById('status');
      el.className = cls;
      el.textContent = text;
    }

    function startPing() {
      pingTimer = setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) ws.send('ping');
      }, PING_INTERVAL_MS);
    }

    function stopPing() {
      if (pingTimer) { clearInterval(pingTimer); pingTimer = null; }
    }

    function connect() {
      try {
        ws = new WebSocket(WS_URL);
      } catch (e) {
        setStatus('err', '● 地址错误');
        return;
      }

      ws.onopen = () => {
        setStatus('ok', '● 直播中');
        startPing();
      };

      ws.onmessage = (e) => {
        try { onMessage(JSON.parse(e.data)); }
        catch (err) { /* ignore non-JSON pongs */ }
      };

      ws.onclose = () => {
        stopPing();
        setStatus('warn', '● 重连中...');
        setTimeout(connect, RECONNECT_MS);
      };

      ws.onerror = () => {
        setStatus('err', '● 连接异常');
      };
    }

    // ── Clock ─────────────────────────────────────────────────────────────────
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('clock').textContent = h + ':' + m;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ── Fullscreen on double-click ─────────────────────────────────────────────
    document.addEventListener('dblclick', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen().catch(() => {});
      }
    });

    // ── Clear logs when tab closes ────────────────────────────────────────────
    window.addEventListener('beforeunload', () => {
      navigator.sendBeacon(API_BASE + '/logs/clear');
    });

    // ── Init ──────────────────────────────────────────────────────────────────
    connect();
  </script>
</body>
</html>
